name: glowbloom
description: "Glowbloom — a memory game by TreeAnts Technologies."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App launcher icon (run:  dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: false
  remove_alpha_ios: true
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#141A3E"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  min_sdk_android: 21
