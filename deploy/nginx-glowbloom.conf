# Nginx reverse proxy for the Glowbloom API on an AWS EC2 host.
# Put this at /etc/nginx/sites-available/glowbloom and symlink into sites-enabled.
# Replace api.yourdomain.com with your domain (or use the EC2 public DNS).

server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# After this works on port 80, add HTTPS automatically with:
#   sudo certbot --nginx -d api.yourdomain.com
