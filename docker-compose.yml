services:
  backend:
    build: ./backend
    env_file: ./backend/.env       # your DATABASE_URL, JWT_SECRET, etc.
    ports:
      - "4000:4000"
    restart: unless-stopped

  # Optional: a local Postgres if you are NOT using a managed DB (RDS/Neon/etc).
  # To use it, set DATABASE_URL in backend/.env to:
  #   postgresql://glow:glowpass@db:5432/glowbloom?schema=public
  # and uncomment this service.
  # db:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: glow
  #     POSTGRES_PASSWORD: glowpass
  #     POSTGRES_DB: glowbloom
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped

# volumes:
#   pgdata:
