<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body{height:100%;} body { background:radial-gradient(1200px 800px at 50% -10%, #1b2350 0%, #0c1024 55%, #070a18 100%); color:#F2F4FA; font-family:"Segoe UI",system-ui,Arial,sans-serif; height:100dvh; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:8px; }
  .wrap { width:min(440px,96vw); max-height:100dvh; }
  .brand { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:8px; }
  .brand img { height:42px; width:auto; filter:drop-shadow(0 4px 14px rgba(255,153,0,.35)); }
  .name { font-size:32px; font-weight:800; letter-spacing:.5px; line-height:1; }
  .grad { background:linear-gradient(90deg,#FFB347,#FF7AC6,#7C9BFF); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tagline { text-align:center; font-size:17px; font-style:italic; margin-top:10px; }
  .sub { text-align:center; color:#9aa3c7; margin:6px 0 20px; font-size:13px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
  .stat { border-radius:14px; padding:12px 8px; text-align:center; background:linear-gradient(160deg,rgba(124,155,255,.16),rgba(255,255,255,.03)); border:1px solid rgba(255,255,255,.07); }
  .stat .v { font-size:20px; font-weight:700; }
  .stat .l { font-size:12px; color:#9aa3c7; margin-top:2px; }
  .board-wrap { border-radius:20px; padding:14px; background:linear-gradient(180deg,rgba(30,38,82,.55),rgba(12,16,36,.55)); border:1px solid rgba(255,255,255,.08); box-shadow:0 18px 50px rgba(0,0,0,.45); }
  .hud { display:flex; gap:8px; margin-bottom:14px; }
  .pill { flex:1; border-radius:12px; padding:9px 4px; text-align:center; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.06); }
  .pill .l { font-size:11px; color:#9aa3c7; }
  .pill .v { font-size:18px; font-weight:700; }
  #board { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:min(100%,44dvh); margin:0 auto; }
  .bud { aspect-ratio:1; border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:clamp(20px,5vh,30px); color:#fff; border:2px solid rgba(255,255,255,.16); opacity:.6; cursor:pointer; transition:opacity .2s, transform .12s, box-shadow .25s, filter .2s; user-select:none; filter:saturate(1.15); }
  .bud:hover { opacity:.82; }
  .bud.lit { opacity:1; transform:scale(1.06); border-color:#fff; box-shadow:0 0 26px 4px var(--g), inset 0 0 18px rgba(255,255,255,.35); }
  .bud.bloom { animation:bloom .55s ease; }
  .bud.wilt { animation:shake .4s ease; }
  @keyframes bloom { 0%{transform:scale(1)} 45%{transform:scale(1.16)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
  .controls { display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:14px; }
  button { color:#fff; border:none; border-radius:11px; padding:.7rem 1.2rem; font-size:15px; font-weight:600; cursor:pointer; background:linear-gradient(135deg,#7C5BFF,#9B6BFF); box-shadow:0 6px 18px rgba(124,91,255,.4); transition:transform .1s, filter .15s; }
  button:hover { filter:brightness(1.08); }
  button:active { transform:scale(.97); }
  button.ghost { background:transparent; border:1px solid rgba(255,255,255,.25); box-shadow:none; }
  #status { color:#c9cfeb; font-size:14px; text-align:center; }
  .countbar { height:6px; border-radius:6px; background:rgba(255,255,255,.1); overflow:hidden; margin-top:14px; display:none; }
  .countbar > i { display:block; height:100%; width:100%; background:linear-gradient(90deg,#FFB347,#FF7AC6); transition:width .1s linear; }
  .footer{text-align:center;margin-top:16px;padding-bottom:6px;} .footer .dev{display:block;font-size:11px;color:#8a93b2;margin-bottom:5px;letter-spacing:.4px;} .footer img{height:18px;opacity:.95;} .footer .copy{font-size:10.5px;color:#6b7494;margin-top:6px;}
</style>

<script>
(function(){
  var buds=[
    {c:'#8B7BFF',s:'✿'},{c:'#22C39A',s:'❀'},{c:'#FF7A45',s:'✦'},
    {c:'#3D9BFF',s:'❄'},{c:'#FFC23D',s:'☀'},{c:'#FF5FA8',s:'♥'},
    {c:'#9BD64A',s:'✺'},{c:'#FF5D5D',s:'★'},{c:'#3FD9C2',s:'◆'}
  ];
  var freq=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0];
  var board=document.getElementById('board'), els=[];
  function shade(hex,amt){var n=parseInt(hex.slice(1),16);var r=Math.max(0,Math.min(255,(n>>16)+amt));var g=Math.max(0,Math.min(255,((n>>8)&255)+amt));var b=Math.max(0,Math.min(255,(n&255)+amt));return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
  buds.forEach(function(b,i){
    var d=document.createElement('div');
    d.className='bud';
    d.style.background='radial-gradient(circle at 35% 30%, '+b.c+', '+shade(b.c,-26)+')';
    d.style.setProperty('--g',b.c); d.textContent=b.s;
    d.addEventListener('click',function(){tap(i)});
    board.appendChild(d); els.push(d);
  });
  var seq=[],input=[],level=1,score=0,rad=1,lives=4,phase='idle',ac=null;
  var best={level:0,score:0,light:0,runs:0};
  var timer=null, remaining=0, paused=false;
  function id(x){return document.getElementById(x);}
  function tone(i){try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=freq[i];o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(.2,ac.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.45);o.start();o.stop(ac.currentTime+.46);}catch(e){}}
  function hud(){id('hLevel').textContent=level;id('hScore').textContent=score;id('hRad').textContent='x'+(Math.round(rad*10)/10);id('hLives').textContent=lives;}
  function stats(){id('sLevel').textContent=best.level;id('sScore').textContent=best.score;id('sLight').textContent=best.light;id('sRuns').textContent=best.runs;}
  function flash(i,cls,ms){els[i].classList.add(cls);setTimeout(function(){els[i].classList.remove(cls)},ms||450);}
  function showBtn(text){var b=id('btn');if(text){b.style.display='';b.textContent=text;}else{b.style.display='none';}}
  function newRound(){
    stopCountdown(); input=[]; seq=[]; var len=2+Math.ceil(level/2);
    for(var k=0;k<len;k++)seq.push(Math.floor(Math.random()*9));
    phase='reveal'; showBtn(null); id('status').textContent='Watch closely...';
    var t=520;
    seq.forEach(function(idx,n){setTimeout(function(){flash(idx,'lit',440);tone(idx);},t*n+300);});
    setTimeout(function(){phase='recall';id('status').textContent='Your turn - tap the pattern.';},t*seq.length+400);
  }
  function startCountdown(){
    remaining=3.0; paused=false;
    id('cbar').style.display='block'; id('pauseBtn').style.display=''; id('pauseBtn').textContent='Pause'; showBtn(null);

    timer=setInterval(function(){ if(paused)return; remaining-=0.1; if(remaining<=0){stopCountdown();newRound();return;} renderCount(); },100);
  }
  function renderCount(){ id('cfill').style.width=(Math.max(0,remaining)/3*100)+'%'; id('status').textContent='Next round in '+Math.ceil(remaining)+'s...'; }
  function stopCountdown(){ if(timer){clearInterval(timer);timer=null;} id('cbar').style.display='none'; id('pauseBtn').style.display='none'; }
  id('pauseBtn').addEventListener('click',function(){ paused=!paused; this.textContent=paused?'Resume':'Pause'; if(paused){id('status').textContent='Paused - tap resume to continue.';}else{renderCount();} });
  function tap(i){
    if(phase!=='recall')return;
    flash(i,'lit',220);tone(i);input.push(i);
    var p=input.length-1;
    if(input[p]!==seq[p]){
      flash(i,'wilt',400);lives--;rad=1;phase='idle';hud();
      if(lives<=0){ endRun(); id('status').textContent='The garden dims. Light earned: '+score+'. Tap to begin again.'; showBtn('Play again'); level=1; score=0; }

    }

      seq.forEach(function(idx,n){setTimeout(function(){flash(idx,'bloom',550);},n*90);});
      var gain=Math.round(seq.length*10*rad);
      score+=gain; best.light+=gain; rad=Math.min(rad+0.5,3); level++; hud();
      if(level-1>best.level)best.level=level-1; if(score>best.score)best.score=score; stats();
      setTimeout(startCountdown,650);
    }
  }
  function endRun(){ stopCountdown(); best.runs++; if(score>best.score)best.score=score; if(level-1>best.level)best.level=level-1; stats(); }
  id('btn').addEventListener('click',function(){ if(phase==='idle'){ hud(); newRound(); } });
  hud(); stats();
})();
</script>
